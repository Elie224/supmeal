app = "supmeal-api-elisee"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  BACKEND_HOST = "0.0.0.0"
  BACKEND_PORT = "8765"
  UPLOAD_DIR = "/app/uploads"

[[mounts]]
  source = "uploads_data"
  destination = "/app/uploads"

[[services]]
  protocol = "tcp"
  internal_port = 8765

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"
    method = "get"
    path = "/health"
    protocol = "http"
    tls_skip_verify = false

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
