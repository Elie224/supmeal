name: supmeal

services:
  db:
    image: postgres:16-alpine
    container_name: supmeal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supmeal}
      POSTGRES_USER: ${POSTGRES_USER:-supmeal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supmeal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supmeal} -d ${POSTGRES_DB:-supmeal}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - supmeal-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: supmeal-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-supmeal}
      POSTGRES_USER: ${POSTGRES_USER:-supmeal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supmeal}
    volumes:
      - supmeal-uploads:/app/uploads
    ports:
      - "8765:8765"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8765 --reload"
    networks:
      - supmeal-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8765/api/v1
    container_name: supmeal-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8765/api/v1
    volumes:
      - ./web/src:/app/src
    networks:
      - supmeal-net

volumes:
  pgdata:
  supmeal-uploads:

networks:
  supmeal-net:
    driver: bridge
