name: supmeal

services:
  db:
    image: postgres:16-alpine
    container_name: supmeal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supmeal}
      POSTGRES_USER: ${POSTGRES_USER:-supmeal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supmeal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supmeal} -d ${POSTGRES_DB:-supmeal}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - supmeal-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: supmeal-mailpit
    restart: unless-stopped
    profiles: ["dev"]
    networks:
      - supmeal-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supmeal-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-supmeal}
      POSTGRES_USER: ${POSTGRES_USER:-supmeal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supmeal}
    volumes:
      - supmeal-uploads:/app/uploads
    ports:
      - "8765:8765"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8765"
    networks:
      - supmeal-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_URL: /api/v1
    container_name: supmeal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - supmeal-net

volumes:
  pgdata:
  supmeal-uploads:

networks:
  supmeal-net:
    driver: bridge
